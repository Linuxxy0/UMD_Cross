  <rect x="992" y="564" width="136" height="82" rx="16" fill="#0F1A28" stroke="#6AD2FF" stroke-opacity="0.16"/>
  <text x="1036" y="614" fill="#8EDFFF" font-size="24" font-family="Microsoft YaHei, sans-serif">武学</text>
  <rect x="1146" y="564" width="136" height="82" rx="16" fill="#0F1A28" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="1190" y="614" fill="#F7EFD9" font-size="24" font-family="Microsoft YaHei, sans-serif">防御</text>
  <rect x="1300" y="564" width="136" height="82" rx="16" fill="#0F1A28" stroke="#9FDCA7" stroke-opacity="0.20"/>
  <text x="1344" y="614" fill="#9FDCA7" font-size="24" font-family="Microsoft YaHei, sans-serif">道具</text>
