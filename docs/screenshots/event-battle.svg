<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#07101A"/>
  <rect x="44" y="44" width="1512" height="812" rx="32" fill="#0D1725" stroke="#F5D17E" stroke-opacity="0.12"/>
  <text x="92" y="118" fill="#F5D17E" font-size="22" font-family="Microsoft YaHei, sans-serif">EVENT / BATTLE FLOW</text>
