  <text x="878" y="444" fill="#B5C1AF" font-size="20" font-family="Microsoft YaHei, sans-serif">气血 / 内力 / 武学</text>
  <rect x="1168" y="344" width="258" height="164" rx="20" fill="#0F1A28" stroke="#F18E8E" stroke-opacity="0.20"/>
  <text x="1240" y="402" fill="#F7EFD9" font-size="28" font-family="Microsoft YaHei, sans-serif">敌人</text>
  <text x="1220" y="444" fill="#B5C1AF" font-size="20" font-family="Microsoft YaHei, sans-serif">山匪 / 杀手 / 异象</text>
  <rect x="838" y="564" width="136" height="82" rx="16" fill="#0F1A28" stroke="#F5D17E" stroke-opacity="0.16"/>
