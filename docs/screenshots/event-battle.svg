  <rect x="126" y="528" width="590" height="92" rx="18" fill="#0F1A28" stroke="#6AD2FF" stroke-opacity="0.18"/>
  <text x="154" y="578" fill="#8EDFFF" font-size="24" font-family="Microsoft YaHei, sans-serif">选项二：推门应对，主动接战</text>
  <rect x="126" y="644" width="590" height="92" rx="18" fill="#0F1A28" stroke="#9FDCA7" stroke-opacity="0.20"/>
  <text x="154" y="694" fill="#9FDCA7" font-size="24" font-family="Microsoft YaHei, sans-serif">选项三：绕至侧窗，寻找脱身路线</text>
  <rect x="804" y="238" width="652" height="570" rx="28" fill="#121F31" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="838" y="298" fill="#F7EFD9" font-size="30" font-family="Microsoft YaHei, sans-serif">回合制战斗</text>
