  <rect x="92" y="238" width="658" height="570" rx="28" fill="#121F31" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="126" y="298" fill="#F7EFD9" font-size="30" font-family="Microsoft YaHei, sans-serif">剧情事件</text>
  <text x="126" y="356" fill="#B5C1AF" font-size="22" font-family="Microsoft YaHei, sans-serif">破庙外的雨脚未歇，你听见庙门前有兵刃拖地的轻响。</text>
  <rect x="126" y="412" width="590" height="92" rx="18" fill="#0F1A28" stroke="#F5D17E" stroke-opacity="0.16"/>
