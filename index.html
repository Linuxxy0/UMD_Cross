<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="一念穿越：江湖初卷 - 可直接推送到 GitHub 新仓库并用 GitHub Pages 发布的武侠穿越页游项目" />
  <title>一念穿越：江湖初卷</title>
  <meta name="theme-color" content="#07111d" />
  <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg" />

<body>
  <div id="game-shell">

        <h1>一念穿越：江湖初卷</h1>

      </div>
      <div id="top-actions">

        <button id="btn-export-save" class="ghost-btn">导出存档</button>
        <button id="btn-import-save" class="ghost-btn">导入存档</button>
        <input id="import-save-input" type="file" accept="application/json" hidden />
      </div>
    </div>

    <div id="game-stage">
      <div id="game-container"></div>
      <div id="ui-root"></div>
    </div>

    <div id="toast-root"></div>
  </div>

  <script src="./js/managers/worldManager.js" defer></script>
